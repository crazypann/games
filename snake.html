<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>NEON SNAKE</h1>
        
        <div class="dashboard">
            <div class="stat-box">
                <span class="label">Score</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">High Score</span>
                <span id="highscore" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">Level</span>
                <span id="level" class="value">1</span>
            </div>
            <div class="stat-box">
                <span class="label">Lives</span>
                <span id="lives" class="value">3</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- Difficulty Button Group -->
        <div class="difficulty-controls">
            <button id="btnEasy" class="diff-btn active" data-speed="600">Easy</button>
            <button id="btnMedium" class="diff-btn" data-speed="300">Medium</button>
            <button id="btnHard" class="diff-btn" data-speed="100">Difficult</button>
        </div>

        <div class="controls">
            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart Game</button>
        </div>

        <!-- On-Screen D-Pad -->
        <div class="d-pad" id="dPad">
            <button id="btnUp" class="d-btn up">▲</button>
            <button id="btnLeft" class="d-btn left">◄</button>
            <button id="btnRight" class="d-btn right">►</button>
            <button id="btnDown" class="d-btn down">▼</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
